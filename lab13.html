< !DOCTYPE html >
 < html lang = "en" >
  < head >
  
      < meta charset = "UTF-8" />
   
       < meta name = "viewport" content = "width=device-width, initial-scale=1.0" />
      
          < title > Global Power Plant Trends Dashboard</title>

    <style>
        body {
            font-family: Georgia, "Times New Roman", serif;
margin: 24px;
background: #f7f4ef;
            color: #2f2a24;
        }

        h1
{
    margin - bottom: 6px;
    font - size: 34px;
color: #5a3e2b;
            letter - spacing: 0.3px;
}

        .subtitle
{
    margin - top: 0;
color: #6d5c4f;
            font - size: 17px;
    max - width: 900px;
}

        .dashboard
{
display: grid;
    grid - template - columns: 1fr;
gap: 28px;
    max - width: 1100px;
}

        .card
{
border: 1px solid #d8cfc3;
            border - radius: 14px;
padding: 18px;
background: #fffdf9;
            box - shadow: 0 3px 10px rgba(0,0,0,0.06);
}

        .chart - title {
margin: 0 0 8px 0;
    font - size: 20px;
    font - weight: 700;
color: #4e342e;
        }

        .insight
{
margin: 0 0 14px 0;
    font - size: 15px;
color: #6a5647;
            line - height: 1.5;
}

svg
{
width: 100 %;
height: auto;
background: #fffaf5;
            border - radius: 10px;
}
    </ style >

    < script src = "https://d3js.org/d3.v7.min.js" ></ script >
 </ head >
 

 < body >
 
     < h1 > Global Power Plant Trends Dashboard</h1>
    <p class= "subtitle" >
        This dashboard explores how power plant size, energy source, and capacity composition have shifted over time, with a particular focus on the rise of renewables relative to non-renewables.
    </p>
    
    <div class= "dashboard" >
        < div class= "card" >
 
             < p class= "chart-title" > 1: Power Plant Size by Year Built</p>
            <p class= "insight" >
                Insight: Larger plants appear more common in earlier decades, while more recently built plants tend to be smaller on average and more concentrated in renewable categories such as wind and solar.
            </p>
            <svg id="scatter" width="1000" height="420"></svg>
        </div>

        <div class= "card" >
            < p class= "chart-title" > 2: Renewable vs Non-Renewable Capacity Over Time</p>
            <p class= "insight" >
                Insight: Non - renewables dominate earlier years, but renewable capacity rises sharply in later decades. By the 2010s, renewables account for most total installed capacity in the dataset.
            </p>
            <svg id="lines" width="1000" height="420"></svg>
        </div>

        <div class= "card" >
            < p class= "chart-title" > 3: Capacity by Decade and Energy Type</p>
            <p class= "insight" >
                Insight: The composition of plant types clearly shifts across decades: coal and nuclear are strongest in earlier periods, while wind becomes prominent in the 2010s and solar stands out in the 2020s.
            </p>
            <svg id="bars" width="1000" height="460"></svg>
        </div>
    </div>

    <script>
        function getEnergyTypes(data) {
    const types = [];
    data.forEach(d => {
        if (!types.includes(d.energy_type))
        {
            types.push(d.energy_type);
        }
    });
    return types;
}

function isRenewableType(t)
{
    if (t === "Wind") return true;
    if (t === "Solar") return true;
    if (t === "Hydro") return true;
    return false;
}

d3.csv("power_plants.csv").then(data => {
data.forEach(d => {
    d.capacity_mw = +d.capacity_mw;
    d.year_built = +d.year_built;
});

const energyTypes = getEnergyTypes(data);

const colorScale = d3.scaleOrdinal()
  .domain(energyTypes)
  .range([
    "#8c564b", // Coal
    "#c49a6c", // Gas
    "#4c78a8", // Hydro
    "#7b6888", // Nuclear
    "#f2b134", // Solar
    "#5b8c5a"  // Wind
  ]);

// Chart 1: Scatter Plot
{
    const svg = d3.select("#scatter");
    const svgW = +svg.attr("width");
    const svgH = +svg.attr("height");

    const margin = { top: 30, right: 20, bottom: 60, left: 70 };
const width = svgW - margin.left - margin.right;
const height = svgH - margin.top - margin.bottom;

const g = svg.append("g")
  .attr("transform", `translate(${margin.left},${ margin.top})`);

const xScale = d3.scaleLinear()
  .domain(d3.extent(data, d => d.year_built))
  .range([0, width]);

const yScale = d3.scaleLinear()
  .domain([0, d3.max(data, d => d.capacity_mw)])
          .range([height, 0]);

g.append("g")
  .attr("transform", `translate(0, ${ height})`)
          .call(d3.axisBottom(xScale));

g.append("g")
  .call(d3.axisLeft(yScale));

g.append("text")
  .attr("x", width / 2)
  .attr("y", height + 45)
  .attr("text-anchor", "middle")
  .text("Year Built");

g.append("text")
  .attr("x", -height / 2)
  .attr("y", -50)
  .attr("transform", "rotate(-90)")
  .attr("text-anchor", "middle")
  .text("Capacity (MW)");

g.selectAll("circle")
  .data(data)
  .join("circle")
  .attr("cx", d => xScale(d.year_built))
  .attr("cy", d => yScale(d.capacity_mw))
  .attr("r", 5)
  .style("fill", d => colorScale(d.energy_type))
  .style("opacity", 0.85);
      }

      // Chart 2: Line Chart
      {
    data.forEach(d => {
        d.type_group = isRenewableType(d.energy_type) ? "Renewable" : "Non-Renewable";
        d.year_date = new Date(d.year_built, 0, 1);
    });

    const result = d3.rollup(
      data,
      v => d3.sum(v, d => d.capacity_mw),
      d => d.type_group,
      d => d.year_date
    );

    const lineData = Array.from(result, ([groupName, yearMap]) => {
        const values = Array.from(yearMap, ([date, total]) => ({
        date: date,
            total: total
          }));

        values.sort((a, b) => a.date - b.date);

        return {
        group: groupName,
            values: values
          };
    });

    let maxTotal = 0;
    lineData.forEach(series => {
        series.values.forEach(pt => {
            if (pt.total > maxTotal) maxTotal = pt.total;
        });
    });

    const svg = d3.select("#lines");
    const svgW = +svg.attr("width");
    const svgH = +svg.attr("height");

    const margin = { top: 30, right: 20, bottom: 60, left: 70 };
const width = svgW - margin.left - margin.right;
const height = svgH - margin.top - margin.bottom;

const g = svg.append("g")
  .attr("transform", `translate(${margin.left},${ margin.top})`);

const xScale = d3.scaleTime()
  .domain(d3.extent(data, d => d.year_date))
  .range([0, width]);

const yScale = d3.scaleLinear()
  .domain([0, maxTotal])
          .range([height, 0]);

g.append("g")
  .attr("transform", `translate(0, ${ height})`)
          .call(d3.axisBottom(xScale));

g.append("g")
  .call(d3.axisLeft(yScale));

g.append("text")
  .attr("x", width / 2)
  .attr("y", height + 45)
  .attr("text-anchor", "middle")
  .text("Year Built");

g.append("text")
  .attr("x", -height / 2)
  .attr("y", -50)
  .attr("transform", "rotate(-90)")
  .attr("text-anchor", "middle")
  .text("Total Capacity (MW)");

const line = d3.line()
  .x(d => xScale(d.date))
  .y(d => yScale(d.total));

const groupColor = d3.scaleOrdinal()
  .domain(["Renewable", "Non-Renewable"])
          .range(["#4f7f52", "#8c564b"]);

g.selectAll(".line")
  .data(lineData)
  .join("path")
  .attr("class", "line")
  .attr("fill", "none")
  .attr("stroke", d => groupColor(d.group))
  .attr("stroke-width", 3)
  .attr("d", d => line(d.values));
      }

      // Chart 3: Clustered Bar Chart
      {
    data.forEach(d => {
        d.decade = Math.floor(d.year_built / 10) * 10;
    });

    const barResult = d3.rollup(
      data,
      v => d3.sum(v, d => d.capacity_mw),
      d => d.decade,
      d => d.energy_type
    );

    const barData = Array.from(barResult, ([decade, typeMap]) => {
        return {
        decade: decade,
            values: Array.from(typeMap, ([type, total]) => ({
            type: type,
              total: total
            }))
          };
    });

    barData.sort((a, b) => a.decade - b.decade);

    let maxBar = 0;
    barData.forEach(d => {
        d.values.forEach(v => {
            if (v.total > maxBar) maxBar = v.total;
        });
    });

    const svg = d3.select("#bars");
    const svgW = +svg.attr("width");
    const svgH = +svg.attr("height");

    const margin = { top: 30, right: 20, bottom: 80, left: 70 };
const width = svgW - margin.left - margin.right;
const height = svgH - margin.top - margin.bottom;

const g = svg.append("g")
  .attr("transform", `translate(${margin.left},${ margin.top})`);

const decades = [];
barData.forEach(d => decades.push(d.decade));

const x0 = d3.scaleBand()
  .domain(decades)
  .range([0, width])
          .padding(0.2);

const x1 = d3.scaleBand()
  .domain(energyTypes)
  .range([0, x0.bandwidth()])
          .padding(0.05);

const y = d3.scaleLinear()
  .domain([0, maxBar])
          .range([height, 0]);

g.append("g")
  .attr("transform", `translate(0, ${ height})`)
          .call(d3.axisBottom(x0));

g.append("g")
  .call(d3.axisLeft(y));

g.append("text")
  .attr("x", width / 2)
  .attr("y", height + 55)
  .attr("text-anchor", "middle")
  .text("Decade");

g.append("text")
  .attr("x", -height / 2)
  .attr("y", -50)
  .attr("transform", "rotate(-90)")
  .attr("text-anchor", "middle")
  .text("Total Capacity (MW)");

g.selectAll("g.decade-group")
  .data(barData)
  .join("g")
  .attr("class", "decade-group")
  .attr("transform", d => `translate(${ x0(d.decade)},0)`)
          .selectAll("rect")
          .data(d => d.values)
          .join("rect")
          .attr("x", d => x1(d.type))
          .attr("y", d => y(d.total))
          .attr("width", x1.bandwidth())
          .attr("height", d => height - y(d.total))
          .attr("fill", d => colorScale(d.type))
          .style("opacity", 0.9);
      }

    });
    </ script >
</ body >
</ html >
